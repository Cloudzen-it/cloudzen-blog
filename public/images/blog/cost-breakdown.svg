  <text x="162" y="160" text-anchor="end" fill="#ff6b6b" font-size="13" font-weight="700">$400</text>

  <!-- RDS -->
  <rect x="60" y="182" width="200" height="38" rx="4" fill="#ff6b6b" fill-opacity="0.15" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.25" />
  <text x="72" y="206" fill="#ff8a8a" font-size="12" font-weight="600">RDS (over-provisioned)</text>
  <text x="248" y="206" text-anchor="end" fill="#ff6b6b" font-size="13" font-weight="700">$700</text>

  <!-- NAT + other -->
  <rect x="60" y="228" width="86" height="38" rx="4" fill="#ff6b6b" fill-opacity="0.1" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.2" />
