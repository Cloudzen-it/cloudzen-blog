<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgG3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="280" rx="12" fill="url(#bgG3)" />

  <!-- Card 1: Cost -->
  <rect x="20" y="20" width="200" height="240" rx="10" fill="#1a1a24" stroke="#51cf66" stroke-width="1" stroke-opacity="0.3" />
  <text x="120" y="55" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">AWS COSTS</text>
  <text x="120" y="100" text-anchor="middle" fill="#51cf66" font-size="40" font-weight="800">60%</text>
  <text x="120" y="122" text-anchor="middle" fill="#51cf66" font-size="13">reduction</text>
  <line x1="50" y1="140" x2="190" y2="140" stroke="#333" stroke-width="1" />
  <text x="120" y="165" text-anchor="middle" fill="#ff6b6b" font-size="13">$2,800</text>
  <text x="120" y="185" text-anchor="middle" fill="#888" font-size="18">&#8595;</text>
  <text x="120" y="210" text-anchor="middle" fill="#51cf66" font-size="15" font-weight="700">$1,120</text>
  <text x="120" y="240" text-anchor="middle" fill="#666" font-size="10">$20K saved annually</text>

  <!-- Card 2: Deploy -->
  <rect x="240" y="20" width="200" height="240" rx="10" fill="#1a1a24" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.3" />
  <text x="340" y="55" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">DEPLOY TIME</text>
  <text x="340" y="100" text-anchor="middle" fill="#8b5cf6" font-size="40" font-weight="800">90%</text>
  <text x="340" y="122" text-anchor="middle" fill="#8b5cf6" font-size="13">faster</text>
  <line x1="270" y1="140" x2="410" y2="140" stroke="#333" stroke-width="1" />
  <text x="340" y="165" text-anchor="middle" fill="#ff6b6b" font-size="13">25 min</text>
  <text x="340" y="185" text-anchor="middle" fill="#888" font-size="18">&#8595;</text>
  <text x="340" y="210" text-anchor="middle" fill="#8b5cf6" font-size="15" font-weight="700">2.5 min</text>
  <text x="340" y="240" text-anchor="middle" fill="#666" font-size="10">Per deployment</text>

  <!-- Card 3: Security -->
  <rect x="460" y="20" width="200" height="240" rx="10" fill="#1a1a24" stroke="#f59e0b" stroke-width="1" stroke-opacity="0.3" />
  <text x="560" y="55" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">SECURITY</text>
  <text x="560" y="100" text-anchor="middle" fill="#f59e0b" font-size="40" font-weight="800">0</text>
  <text x="560" y="122" text-anchor="middle" fill="#f59e0b" font-size="13">critical findings</text>
  <line x1="490" y1="140" x2="630" y2="140" stroke="#333" stroke-width="1" />
  <text x="560" y="165" text-anchor="middle" fill="#ff6b6b" font-size="13">Never audited</text>
  <text x="560" y="185" text-anchor="middle" fill="#888" font-size="18">&#8595;</text>
  <text x="560" y="210" text-anchor="middle" fill="#f59e0b" font-size="15" font-weight="700">Every commit</text>
  <text x="560" y="240" text-anchor="middle" fill="#666" font-size="10">Automated scanning</text>

  <!-- Card 4: Recovery -->
  <rect x="680" y="20" width="200" height="240" rx="10" fill="#1a1a24" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.3" />
  <text x="780" y="55" text-anchor="middle" fill="#888" font-size="11" font-weight="600" letter-spacing="1">RECOVERY TIME</text>
  <text x="780" y="100" text-anchor="middle" fill="#06b6d4" font-size="40" font-weight="800">82%</text>
  <text x="780" y="122" text-anchor="middle" fill="#06b6d4" font-size="13">faster recovery</text>
  <line x1="710" y1="140" x2="850" y2="140" stroke="#333" stroke-width="1" />
  <text x="780" y="165" text-anchor="middle" fill="#ff6b6b" font-size="13">~45 min</text>
  <text x="780" y="185" text-anchor="middle" fill="#888" font-size="18">&#8595;</text>
  <text x="780" y="210" text-anchor="middle" fill="#06b6d4" font-size="15" font-weight="700">~8 min</text>
  <text x="780" y="240" text-anchor="middle" fill="#666" font-size="10">Full stack redeploy</text>
</svg>
