  <!-- BEFORE bars -->
  <!-- ECS -->
  <rect x="60" y="90" width="280" height="38" rx="4" fill="#ff6b6b" fill-opacity="0.25" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.4" />
  <text x="72" y="114" fill="#ff8a8a" font-size="12" font-weight="600">ECS Fargate (always-on)</text>
  <text x="328" y="114" text-anchor="end" fill="#ff6b6b" font-size="13" font-weight="700">$1,400</text>

  <!-- ALB -->
  <rect x="60" y="136" width="114" height="38" rx="4" fill="#ff6b6b" fill-opacity="0.2" stroke="#ff6b6b" stroke-width="1" stroke-opacity="0.3" />
