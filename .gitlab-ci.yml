stages:
  - build
  - deploy

variables:
  NODE_VERSION: "22"

build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_IID

deploy:
  stage: deploy
  image: node:${NODE_VERSION}-alpine
  needs: [build]
  script:
    - npx wrangler pages deploy dist/ --project-name cloudzen-blog --branch main
  environment:
    name: production
    url: https://blog.cloudzendevops.com
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
