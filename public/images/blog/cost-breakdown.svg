<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="bgG2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a24;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="900" height="340" rx="12" fill="url(#bgG2)" />

  <text x="450" y="38" text-anchor="middle" fill="#fff" font-size="16" font-weight="700">Monthly Cost Breakdown</text>

  <!-- Headers -->
  <text x="200" y="72" text-anchor="middle" fill="#ff6b6b" font-size="13" font-weight="600">Before ($2,800)</text>
